---
# Defaults
perform_base_install: true

# --- Network / GPG-fetch workarounds for hosts with black-holed IPv6 ---
# Option 1 (prefer_ipv4_resolution): set glibc IPv4 precedence in /etc/gai.conf so
#   get_url/apt don't stall ~80s on a dead IPv6 address before falling back to IPv4.
# Option 2 (fetch_gpg_keys_on_controller): fetch GPG keys once on the Ansible
#   controller and copy them to hosts, sidestepping host IPv6 for the key downloads.
prefer_ipv4_resolution: true
fetch_gpg_keys_on_controller: false

docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg

docker_repo: >
  deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg]
  https://download.docker.com/linux/debian {{ ansible_lsb.codename }} stable

ubuntu_containerd_package: containerd.io

k8s_release_version: v1.30.1
kubernetes_version: "{{ k8s_release_version | regex_replace('^v', '') }}-1.1" # Example 1.30.1-00
kubernetes_gpg_url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_release_version | regex_replace('^(v\\d+\\.\\d+).*', '\\1') }}/deb/Release.key"
kubernetes_repo: >
  deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
  https://pkgs.k8s.io/core:/stable:/{{ k8s_release_version | regex_replace('\.1', '') }}/deb/ /
kubernetes_user: akalaj

k8s_binary_location: /usr/bin
script_location: /tmp/
local_kube_config: "{{ script_location }}/config"
kubernetes_join_script: "{{ script_location }}/kubeadm-join.sh"

# --- Local data-disk provisioning for AiStor (all-or-nothing per node) ---
# Formats + mounts the node-local block devices that back the OpenTofu local PVs
# (/mnt/data{N}). MinIO erasure-codes across the whole drive set, so the set is
# provisioned atomically: a fully formatted+mounted set is left alone, an
# inconsistent set is wiped and reformatted as a unit, and (when
# data_disk_preserve_existing is true) any pre-existing data halts the play.
# NOTE: data_disk_count MUST match the OpenTofu module disk_count (test-aistor-pv-config).
configure_data_disks: true
data_disk_mount_base: /mnt
data_disk_dir_name: data            # -> /mnt/data{N}
data_disk_device_prefix: nvme0n     # -> /dev/nvme0n{N}
data_disk_count: 8
data_disk_fstype: xfs               # xfsprogs is installed via install/Debian.yaml
data_disk_mount_opts: "defaults,noatime"
data_disk_preserve_existing: false  # false = wipe+format a non-converged set; true = HALT if data found

crictl_version: v1.34.0

calico_version: v3.28.2
calico_operator_manifest: "https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/tigera-operator.yaml"
calico_custom_resources_manifest: "https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/custom-resources.yaml"

wait_hostname_file_change: false

# --- Helm CLI on the control-plane node (kube_masters[0]) ---
# Installed for imperative helm/kubectl workflows, notably the supervised
# open-source -> AiStor migration (MIGRATION.md needs Helm >= 3.17). NOT required
# by the OpenTofu helm provider. Toggle with install_helm.
install_helm: true
helm_version: v3.21.2
helm_install_dir: /usr/local/bin
helm_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ('arm64' if ansible_architecture == 'aarch64' else ansible_architecture) }}"